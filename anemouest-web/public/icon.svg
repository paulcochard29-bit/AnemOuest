<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="wind" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#54D9EB"/>
      <stop offset="50%" style="stop-color:#59E385"/>
      <stop offset="100%" style="stop-color:#F8E654"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Wind lines -->
  <g fill="none" stroke="url(#wind)" stroke-width="28" stroke-linecap="round">
    <path d="M100 180 Q200 180 250 140 Q300 100 350 140">
      <animate attributeName="d" dur="3s" repeatCount="indefinite"
        values="M100 180 Q200 180 250 140 Q300 100 350 140;
                M100 180 Q200 160 250 180 Q300 200 350 160;
                M100 180 Q200 180 250 140 Q300 100 350 140"/>
    </path>
    <path d="M80 256 Q180 256 260 216 Q340 176 420 216">
      <animate attributeName="d" dur="2.5s" repeatCount="indefinite"
        values="M80 256 Q180 256 260 216 Q340 176 420 216;
                M80 256 Q180 236 260 256 Q340 276 420 236;
                M80 256 Q180 256 260 216 Q340 176 420 216"/>
    </path>
    <path d="M100 332 Q200 332 280 292 Q360 252 400 292">
      <animate attributeName="d" dur="3.5s" repeatCount="indefinite"
        values="M100 332 Q200 332 280 292 Q360 252 400 292;
                M100 332 Q200 312 280 332 Q360 352 400 312;
                M100 332 Q200 332 280 292 Q360 252 400 292"/>
    </path>
  </g>
  <!-- A letter stylized -->
  <text x="256" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="100" font-weight="bold" fill="white" opacity="0.9">A</text>
</svg>
